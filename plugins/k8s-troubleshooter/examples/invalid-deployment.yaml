# ❌ INVALID: Deployment with common violations

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      # ❌ VIOLATION 1: Using cluster-admin service account
      serviceAccountName: cluster-admin

      containers:
      - name: api
        # ❌ VIOLATION 2: Image uses "latest" tag
        image: myapi:latest
        # ❌ VIOLATION 3: imagePullPolicy not set (assumes latest)

        ports:
        - containerPort: 8080

        # ❌ VIOLATION 4: No resource requests or limits
        # resources:  <-- MISSING!
        #   requests:
        #     cpu: "100m"
        #     memory: "128Mi"
        #   limits:
        #     cpu: "500m"
        #     memory: "256Mi"

        # ❌ VIOLATION 5: No liveness probe
        # livenessProbe: <-- MISSING!
        #   httpGet:
        #     path: /health
        #     port: 8080

        # ❌ VIOLATION 6: No readiness probe
        # readinessProbe: <-- MISSING!
        #   httpGet:
        #     path: /ready
        #     port: 8080

        env:
        - name: LOG_LEVEL
          value: "debug"
        - name: PORT
          value: "8080"

---
# ❌ VIOLATION: Using cluster-admin role for regular app
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-admin
  namespace: production

---
# ❌ This binds service account to cluster-admin (dangerous!)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: cluster-admin
  namespace: production
